name: ragent

services:
  ragent-frontend:
    container_name: ragent-frontend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - BACKEND_HOST=host.docker.internal:9090
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
